<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnitrack Control Interface</title>
    <style>
        :root { 
            --accent-color: #00ff88; 
            --bg-main: #0a0a0c; 
            --panel-bg: #121216; 
            --panel-card: #18181f;
            --border-clr: rgba(255, 255, 255, 0.08); 
            --alert-red: #ff3b30; 
            --text-main: #ffffff;
            --text-muted: #8e8e9c;
            --max-width: 1200px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            min-height: 100vh; 
            min-height: 100dvh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 90px;
            overflow-x: hidden;
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        /* 🏙️ FULL-WIDTH GLASS HEADER */
        header { 
            width: 100%; 
            background: rgba(18, 18, 22, 0.8); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-clr); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            display: flex;
            justify-content: center;
        }

        .header-container {
            width: 100%;
            max-width: var(--max-width);
            padding: 16px 24px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .logo-box { 
            font-size: 18px; 
            font-weight: 700; 
            letter-spacing: 1.5px; 
            color: var(--accent-color); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            transition: color 0.3s ease;
        }

        .heartbeat { 
            width: 8px; height: 8px; 
            background-color: var(--accent-color); 
            border-radius: 50%; 
            display: inline-block; 
            box-shadow: 0 0 12px var(--accent-color); 
            animation: pulse 2s infinite; 
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        #connection-status {
            font-size: 11px; 
            color: var(--text-muted); 
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        /* 📱 RESPONSIVE APP GRID CONTAINER */
        .app-container { 
            width: 100%; 
            max-width: var(--max-width); 
            padding: 24px; 
        }

        .tab-panel { 
            display: none; 
        }

        .tab-panel.active { 
            display: block; 
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* 🎯 CENTERED LAYOUT SYSTEM FOR SINGLE DASHBOARD CARDS */
        .centered-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .centered-layout .card {
            width: 100%;
            max-width: 440px; 
        }
        
        .card { 
            background-color: var(--panel-card); 
            border: 1px solid var(--border-clr); 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.2); 
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative; 
            overflow: hidden; 
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 16px;
            text-align: left;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }
        
        /* 🎯 PROXIMITY RADIAL DIAL */
        .radial-meter { 
            width: 180px; 
            height: 180px; 
            border: 4px solid var(--accent-color); 
            border-radius: 50%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            margin: 20px auto; 
            background: rgba(255,255,255,0.01);
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.05);
            transition: border-color 0.3s ease, box-shadow 0.3s ease; 
        }

        .meters-num { 
            font-size: 42px; 
            font-weight: 800; 
            font-variant-numeric: tabular-nums;
        }

        .unit-lbl { 
            font-size: 11px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-top: 2px;
        }
        
        /* 🚨 ALARM EMERGENCY MODE STATE */
        body.alarm-active { background-color: #140505; }
        body.alarm-active .radial-meter { 
            border-color: var(--alert-red); 
            animation: flashRed 1.5s infinite alternate; 
            box-shadow: 0 0 24px rgba(255, 59, 48, 0.2), inset 0 0 20px rgba(255, 59, 48, 0.1); 
        }
        body.alarm-active .logo-box, body.alarm-active #dist-val { color: var(--alert-red); }
        body.alarm-active .heartbeat { background-color: var(--alert-red); box-shadow: 0 0 12px var(--alert-red); }
        
        /* ⚡ TELEMETRY MATRIX DATA ROWS */
        .row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.03); 
            padding: 14px 18px; 
            border-radius: 12px; 
            margin: 8px 0; 
            border: 1px solid rgba(255, 255, 255, 0.02); 
        }

        .lbl { 
            color: rgba(255, 255, 255, 0.6); 
            font-size: 13px; 
            font-weight: 500;
        }

        .val { 
            font-weight: 600; 
            font-size: 14px; 
        }

        /* 🎛️ FORMS, CONTROL SLIDERS & INPUTS */
        .input-group { text-align: left; margin-bottom: 16px; width: 100%; }
        label { 
            display: block; 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 600;
        }
        
        .slider-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            background: rgba(255,255,255,0.03); 
            padding: 12px 16px; 
            border-radius: 12px; 
            border: 1px solid var(--border-clr); 
        }

        input[type="range"] { 
            flex: 1; 
            accent-color: var(--accent-color); 
            cursor: pointer; 
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        .slider-value { 
            font-weight: 700; 
            font-size: 16px; 
            color: var(--accent-color); 
            min-width: 50px; 
            text-align: right; 
        }

        .btn { 
            width: 100%; 
            background: var(--accent-color); 
            color: #000000; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 14px; 
            cursor: pointer; 
            margin-top: 12px; 
            transition: opacity 0.2s, transform 0.1s ease; 
        }

        .btn:hover { opacity: 0.95; }
        .btn:active { transform: scale(0.99); }

        /* 🧭 FULL-WIDTH BOTTOM NAVIGATION BAR */
        nav { 
            position: fixed; 
            bottom: 0; 
            left: 0;
            width: 100%; 
            background: rgba(18, 18, 22, 0.9); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-clr); 
            display: flex; 
            justify-content: center;
            z-index: 1000; 
        }

        .nav-container {
            width: 100%;
            max-width: var(--max-width);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .nav-item { 
            color: var(--text-muted); 
            font-size: 11px; 
            font-weight: 500;
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 100px;
        }

        .nav-item:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .nav-item.active { 
            color: var(--accent-color); 
            font-weight: 700; 
        }
        
        /* 🖼️ ASSET PROTECTION INTERFACE FRAME */
        .nav-item img { 
            width: 22px; 
            height: 22px; 
            object-fit: contain; 
            opacity: 0.5;
            transition: transform 0.2s ease, opacity 0.2s ease, filter 0.2s ease; 
        }

        .nav-item:hover img {
            opacity: 0.8;
        }

        .nav-item.active img { 
            opacity: 1;
            transform: translateY(-1px);
            filter: drop-shadow(0 0 6px var(--accent-color)); 
        }

        /* 🔋 PREMIUM POWER PACK BATTERY COMPONENT */
        .battery-pill { 
            width: 38px; 
            height: 18px; 
            border: 2px solid rgba(255,255,255,0.4); 
            border-radius: 5px; 
            position: relative; 
            padding: 1.5px; 
            display: flex; 
        }

        .battery-pill::after { 
            content: ''; 
            width: 2.5px; 
            height: 8px; 
            background: rgba(255,255,255,0.4); 
            position: absolute; 
            right: -4.5px; 
            top: 3px; 
            border-radius: 0 2px 2px 0; 
        }

        .battery-level { 
            height: 100%; 
            background: var(--accent-color); 
            width: 0%; 
            border-radius: 1.5px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .charging-flash { animation: chargeLoop 1.5s infinite linear; }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes chargeLoop { from { width: 0%; opacity: 0.3; } to { width: 100%; opacity: 1; } }
        @keyframes flashRed { from { opacity: 0.8; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-box"><span class="heartbeat" id="system-heartbeat"></span> OMNITRACK</div>
            <div id="connection-status">TAP CARD TO LINK</div>
        </div>
    </header>

    <div class="app-container">
        
        <div id="tab-monitor" class="tab-panel active">
            <div class="centered-layout">
                <div class="card" id="radar-activation-card">
                    <div class="radial-meter" id="proximity-container">
                        <span class="meters-num" id="dist-val">---</span>
                        <span class="unit-lbl">Meters</span>
                    </div>
                    <div class="row">
                        <span class="lbl">Set Alert Perimeter:</span>
                        <span class="val" id="perimeter-lbl" style="color: var(--accent-color);">0.0m</span>
                    </div>
                    <div class="row">
                        <span class="lbl">Signal Strength Profile:</span>
                        <span class="val" id="rssi-val">DISCONNECTED</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-power" class="tab-panel">
            <div class="centered-layout">
                <div class="card">
                    <h3>Power Environment</h3>
                    <div class="row">
                        <span class="lbl">Battery Capacity:</span>
                        <span class="val" id="batt-text" style="display:flex; align-items:center; gap:12px;">
                            0% 
                            <div class="battery-pill"><div class="battery-level" id="batt-pill-fill"></div></div>
                        </span>
                    </div>
                    <div class="row">
                        <span class="lbl">Power Controller State:</span>
                        <span class="val" id="power-state">DEVICE OFFLINE</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-settings" class="tab-panel">
            <div class="centered-layout">
                <div class="card">
                    <h3>Device Provisioning</h3>
                    <div class="input-group">
                        <label>Proximity Safe Boundary</label>
                        <div class="slider-wrapper">
                            <input type="range" id="threshSlider" min="0.5" max="5.0" step="0.1" value="3.0" oninput="updateSliderLabel(this.value)" onchange="saveThresholdBackend(this.value)">
                            <span class="slider-value" id="sliderValDisplay">3.0m</span>
                        </div>
                    </div>
                    <p style="color: var(--text-muted); font-size: 12px; text-align: left; line-height: 1.5; margin-top: 8px;">
                        * Network parameters are dynamically managed via clean secure 1-to-1 hardware BLE bonds.
                    </p>
                </div>
            </div>
        </div>
        
    </div>

    <nav>
        <div class="nav-container">
            <button class="nav-item active" onclick="switchTab(event, 'tab-monitor')">
                <img src="icons/icons8-radar-50.png" alt="Radar">
                <span>Radar</span>
            </button>
            <button class="nav-item" onclick="switchTab(event, 'tab-power')">
                <img src="icons/icons8-battery-48.png" alt="Power">
                <span>Power</span>
            </button>
            <button class="nav-item" onclick="switchTab(event, 'tab-settings')">
                <img src="icons/icons8-config-40.png" alt="Config">
                <span>Config</span>
            </button>
        </div>
    </nav>

 <script>
        // 🔒 GLOBAL BLUETOOTH CONFIGURATION ATTRIBUTES
        #define SERVICE_UUID        "4fafc201-1fb5-459e-8fcc-c5c9c331914b"
        #define TELEMETRY_UUID      "beb5483e-36e1-4688-b7f5-ea07361b26a8"
        #define SETTINGS_UUID       "cba1d001-cc4b-4a4a-9b32-e07361b26a8"

        let telemetryCharacteristic = null;
        let settingsCharacteristic = null;
        let bleDevice = null;
        let initialLoad = true;
        let isConnecting = false; 

        // 🧭 NAVIGATION TAB SWITCHER SYSTEM
        function switchTab(e, tabId) {
            document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        // 🎛️ SLIDER METRICS DISPLAY LABEL
        function updateSliderLabel(val) {
            document.getElementById("sliderValDisplay").innerText = parseFloat(val).toFixed(1) + "m";
        }

        // 🔌 WEB BLUETOOTH LAYER INTERACTION
        document.addEventListener("DOMContentLoaded", () => {
            const connectTarget = document.getElementById('radar-activation-card');
            
            if(connectTarget) {
                connectTarget.style.cursor = 'pointer';
                connectTarget.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();

                    if (isConnecting) return; 

                    if (!bleDevice || !bleDevice.gatt.connected) {
                        initializeBLEConnection();
                    }
                });
            }

            const slider = document.getElementById("threshSlider");
            if (slider) {
                slider.addEventListener("input", (e) => {
                    updateSliderLabel(e.target.value);
                });

                slider.addEventListener("change", (e) => {
                    saveThresholdBackend(e.target.value);
                });
            }
        });

        async function initializeBLEConnection() {
            if (isConnecting) return;
            isConnecting = true;

            try {
                document.getElementById("connection-status").innerText = "SEARCHING...";
                document.getElementById("connection-status").style.color = "var(--text-muted)";
                
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }],
                    optionalServices: [SERVICE_UUID] 
                });

                bleDevice.addEventListener('gattserverdisconnected', handleDisconnectionState);

                console.log("Connecting to GATT Server...");
                const server = await bleDevice.gatt.connect();
                
                console.log("Locating primary profile service...");
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                console.log("Binding telemetry characteristic...");
                telemetryCharacteristic = await service.getCharacteristic(TELEMETRY_UUID);
                
                console.log("Binding configurations characteristic...");
                // 💥 If your code crashes, check your browser console tool to read this exact checkpoint!
                settingsCharacteristic = await service.getCharacteristic(SETTINGS_UUID);

                console.log("Initializing telemetry notification pipeline...");
                await telemetryCharacteristic.startNotifications();
                telemetryCharacteristic.addEventListener('characteristicvaluechanged', processIncomingTelemetry);
                
                document.getElementById("connection-status").innerText = `CONNECTED: ${bleDevice.name.toUpperCase()}`;
                document.getElementById("connection-status").style.color = "#00ff88";
            } catch (error) {
                console.error("🎯 Web Bluetooth System Fault:", error);
                
                // 🛡️ SELF-HEALING FAILSAFE: Clean up ghost link connections on crash
                if (bleDevice && bleDevice.gatt.connected) {
                    console.warn("Cleaning up failed initialization connection structure...");
                    bleDevice.gatt.disconnect();
                }

                if (error.name !== 'NotFoundError') {
                    document.getElementById("connection-status").innerText = "LINK FAILED";
                    document.getElementById("connection-status").style.color = "var(--alert-red)";
                } else {
                    document.getElementById("connection-status").innerText = "TAP CARD TO LINK";
                    document.getElementById("connection-status").style.color = "var(--text-muted)";
                }
            } finally {
                isConnecting = false; 
            }
        }

        function handleDisconnectionState() {
            console.warn("Link layer disconnected from the hardware node.");
            
            telemetryCharacteristic = null;
            settingsCharacteristic = null;
            bleDevice = null;
            initialLoad = true;
            isConnecting = false;

            document.body.classList.remove("alarm-active");
            document.getElementById("connection-status").innerText = "TAP CARD TO LINK";
            document.getElementById("connection-status").style.color = "var(--text-muted)";
            
            document.getElementById("dist-val").innerText = "---";
            document.getElementById("rssi-val").innerText = "DISCONNECTED";
            document.getElementById("perimeter-lbl").innerText = "0.0m";
            
            if (document.getElementById("batt-text") && document.getElementById("batt-text").childNodes[0]) {
                document.getElementById("batt-text").childNodes[0].textContent = "0% ";
            }
            
            let fill = document.getElementById("batt-pill-fill");
            if (fill) {
                fill.className = "battery-level";
                fill.style.width = "0%";
            }

            document.getElementById("power-state").innerText = "DEVICE OFFLINE";
            document.getElementById("power-state").style.color = "var(--text-muted)";
        }

        function processIncomingTelemetry(event) {
            try {
                const decoder = new TextDecoder('utf-8');
                const jsonPayload = decoder.decode(event.target.value);
                const data = JSON.parse(jsonPayload);

                document.getElementById("dist-val").innerText = data.distance.toFixed(1);
                document.getElementById("rssi-val").innerText = data.rssi + " dBm";
                document.getElementById("perimeter-lbl").innerText = data.threshold.toFixed(1) + "m";
                
                if (initialLoad) {
                    const slider = document.getElementById("threshSlider");
                    if (slider) {
                        slider.value = data.threshold;
                    }
                    updateSliderLabel(data.threshold);
                    initialLoad = false;
                }
                
                if (data.distance > data.threshold && data.rssi !== -100) {
                    document.body.classList.add("alarm-active");
                    document.getElementById("connection-status").innerText = "CRITICAL: PERIMETER BREACH"; 
                    document.getElementById("connection-status").style.color = "var(--alert-red)";
                } else {
                    document.body.classList.remove("alarm-active");
                    if(bleDevice && bleDevice.gatt.connected) {
                        document.getElementById("connection-status").innerText = `CONNECTED: ${bleDevice.name.toUpperCase()}`;
                        document.getElementById("connection-status").style.color = "#00ff88";
                    }
                }

                if (document.getElementById("batt-text") && document.getElementById("batt-text").childNodes[0]) {
                    document.getElementById("batt-text").childNodes[0].textContent = data.battery + "% ";
                }
                
                let fill = document.getElementById("batt-pill-fill");
                if (fill) {
                    if (data.charging === 1) {
                        document.getElementById("power-state").innerText = "CHARGING ACTIVE"; 
                        document.getElementById("power-state").style.color = "#00ff88";
                        fill.className = "battery-level charging-flash";
                        fill.style.width = "100%";
                    } else {
                        fill.className = "battery-level";
                        fill.style.width = data.battery + "%";
                        fill.style.backgroundColor = (data.battery <= 20) ? "var(--alert-red)" : "var(--accent-color)";
                        
                        document.getElementById("power-state").innerText = (data.battery <= 20) ? "LOW BATTERY WARNING" : "DISCHARGING ON BATTERY";
                        document.getElementById("power-state").style.color = (data.battery <= 20) ? "var(--alert-red)" : "#ffffff";
                    }
                }
            } catch (err) { 
                console.error("Payload Extraction Error:", err);
            }
        }

        async function saveThresholdBackend(val) {
            if (settingsCharacteristic && bleDevice && bleDevice.gatt.connected) {
                try {
                    const payload = JSON.stringify({ limit: parseFloat(val) });
                    const encoder = new TextEncoder();
                    await settingsCharacteristic.writeValue(encoder.encode(payload));
                    
                    console.log(`Dispatched adjustment: ${payload}`);
                    document.getElementById("perimeter-lbl").innerText = parseFloat(val).toFixed(1) + "m";
                } catch (error) {
                    console.error("Configuration Parameter Sync Dropped:", error);
                }
            }
        }
</script>
</body>
</html>
